# Schema: API Gateway (REST)
#
# A REST API with resources (path segments), methods, integrations,
# authorizers, deployment, and stage.
#
# Structural invariants enforced by path equations:
#   1. PublicMethod.RestApiId = Method.ResourceId.RestApiId
#   2. AuthorizedMethod.RestApiId = Method.ResourceId.RestApiId
#   3. AuthorizedMethod.RestApiId = Method.AuthorizerId.RestApiId
#      (an authorized method's authorizer belongs to the same API)
#   4. NestedResource.RestApiId = NestedResource.ParentId.RestApiId
#   5. Stage.RestApiId = Stage.DeploymentId.RestApiId
#
# Design patterns used:
#   - Resource tree: RootResource + NestedResource (different ParentId rendering)
#   - Optional reference: PublicMethod + AuthorizedMethod (split by whether
#     an Authorizer is referenced — morphism functions are total, so optional
#     references require separate objects)
#   - Auto-created resources: Deployment is generated by Kan extension as a
#     default singleton (disconnected from user inputs except via toggle)

# ============================================================================
# C: The CloudFormation-level category
# ============================================================================

OriginalSchema:
  Objects:
    # --- Core API ---
    RestApi:
      CfnType: AWS::ApiGateway::RestApi
      Properties:
        Name:
          Source: api_name
        Description:
          Source: api_description
        EndpointConfiguration:
          Default:
            Types:
              - REGIONAL

    # --- Top-level path resources (parent = API root) ---
    RootResource:
      CfnType: AWS::ApiGateway::Resource
      Properties:
        RestApiId:
          Source: root_resource_api
          Via: Ref
        ParentId:
          Source: root_resource_api
          Via: GetAtt.RootResourceId
        PathPart:
          Source: root_resource_path

    # --- Nested path resources (parent = another resource) ---
    NestedResource:
      CfnType: AWS::ApiGateway::Resource
      Properties:
        RestApiId:
          Source: nested_resource_api
        ParentId:
          Source: nested_parent
        PathPart:
          Source: nested_resource_path

    # --- Public methods (no authorizer) ---
    PublicMethod:
      CfnType: AWS::ApiGateway::Method
      Properties:
        RestApiId:
          Source: pub_method_api
        ResourceId:
          Source: pub_method_resource
        HttpMethod:
          Source: pub_method_verb
        AuthorizationType:
          Source: pub_method_auth

    # --- Authorized methods (with authorizer reference) ---
    AuthorizedMethod:
      CfnType: AWS::ApiGateway::Method
      Properties:
        RestApiId:
          Source: auth_method_api
        ResourceId:
          Source: auth_method_resource
        HttpMethod:
          Source: auth_method_verb
        AuthorizationType:
          Source: auth_method_auth
        AuthorizerId:
          Source: auth_method_authorizer

    # --- Authorizer ---
    Authorizer:
      CfnType: AWS::ApiGateway::Authorizer
      Properties:
        RestApiId:
          Source: authorizer_api
        Name:
          Source: authorizer_name
        Type:
          Source: authorizer_type
        AuthorizerUri:
          Source: authorizer_uri

    # --- Integrations (one per public method) ---
    Integration:
      CfnType: AWS::ApiGateway::Integration
      Properties:
        Type:
          Source: integration_type
        IntegrationHttpMethod:
          Default: "POST"
        Uri:
          Source: integration_uri

    # --- Integrations (one per authorized method) ---
    AuthIntegration:
      CfnType: AWS::ApiGateway::Integration
      Properties:
        Type:
          Source: auth_integration_type
        IntegrationHttpMethod:
          Default: "POST"
        Uri:
          Source: auth_integration_uri

    # --- Deployment ---
    Deployment:
      CfnType: AWS::ApiGateway::Deployment
      Properties:
        RestApiId:
          Source: deployment_api
      Structure:
        Toggle:
          Source: DeployToggle

    # --- Stage ---
    Stage:
      CfnType: AWS::ApiGateway::Stage
      Properties:
        RestApiId:
          Source: stage_api
        DeploymentId:
          Source: stage_deployment
        StageName:
          Source: stage_name

    # --- Value objects ---
    ApiName:
      ValueType: String
    ApiDescription:
      ValueType: String
    PathPart:
      ValueType: String
    NestedPathPart:
      ValueType: String
    HttpVerb:
      ValueType: String
    AuthHttpVerb:
      ValueType: String
    AuthType:
      ValueType: String
    AuthAuthType:
      ValueType: String
    IntegrationType:
      ValueType: String
    IntegrationUri:
      ValueType: String
    AuthIntegrationType:
      ValueType: String
    AuthIntegrationUri:
      ValueType: String
    AuthorizerName:
      ValueType: String
    AuthorizerType:
      ValueType: String
    AuthorizerUri:
      ValueType: String
    StageName:
      ValueType: String

    # --- Toggles ---
    DeployToggle:
      Toggle: true

  Morphisms:
    api_name: RestApi -> ApiName
    api_description: RestApi -> ApiDescription
    root_resource_api: RootResource -> RestApi
    root_resource_path: RootResource -> PathPart
    nested_resource_api: NestedResource -> RestApi
    nested_resource_path: NestedResource -> NestedPathPart
    nested_parent: NestedResource -> RootResource
    # Public method
    pub_method_api: PublicMethod -> RestApi
    pub_method_resource: PublicMethod -> RootResource
    pub_method_verb: PublicMethod -> HttpVerb
    pub_method_auth: PublicMethod -> AuthType
    pub_method_integration: PublicMethod -> Integration
    # Authorized method
    auth_method_api: AuthorizedMethod -> RestApi
    auth_method_resource: AuthorizedMethod -> RootResource
    auth_method_verb: AuthorizedMethod -> AuthHttpVerb
    auth_method_auth: AuthorizedMethod -> AuthAuthType
    auth_method_authorizer: AuthorizedMethod -> Authorizer
    auth_method_integration: AuthorizedMethod -> AuthIntegration
    # Authorizer
    authorizer_api: Authorizer -> RestApi
    authorizer_name: Authorizer -> AuthorizerName
    authorizer_type: Authorizer -> AuthorizerType
    authorizer_uri: Authorizer -> AuthorizerUri
    # Integration
    integration_type: Integration -> IntegrationType
    integration_uri: Integration -> IntegrationUri
    auth_integration_type: AuthIntegration -> AuthIntegrationType
    auth_integration_uri: AuthIntegration -> AuthIntegrationUri
    # Deployment & Stage
    deployment_api: Deployment -> RestApi
    deployment_toggle: Deployment -> DeployToggle
    stage_api: Stage -> RestApi
    stage_deployment: Stage -> Deployment
    stage_name: Stage -> StageName

  Equations:
    # Public method's API must match its Resource's API
    - pub_method_api = pub_method_resource . root_resource_api
    # Authorized method's API must match its Resource's API
    - auth_method_api = auth_method_resource . root_resource_api
    # Authorizer's API must match the authorized method's API
    - auth_method_api = auth_method_authorizer . authorizer_api
    # Nested resource's API must match its parent's API
    - nested_resource_api = nested_parent . root_resource_api
    # Stage's API must match its Deployment's API
    - stage_api = stage_deployment . deployment_api


# ============================================================================
# D: The user-facing category
# ============================================================================

SimplifiedSchema:
  Objects:
    Api:
      Type: Functorial::APIGW::Api
      Properties:
        Name:
          Source: api_name
        Description:
          Source: api_description

    Route:
      Type: Functorial::APIGW::Route
      Properties:
        Path:
          Source: route_path
        Api:
          Source: route_api

    SubRoute:
      Type: Functorial::APIGW::SubRoute
      Properties:
        Path:
          Source: subroute_path
        Parent:
          Source: subroute_parent

    Method:
      Type: Functorial::APIGW::Method
      Properties:
        HttpMethod:
          Source: method_verb
        Auth:
          Source: method_auth
        Route:
          Source: method_route
        IntegrationType:
          Source: method_inttype
        IntegrationUri:
          Source: method_inturi

    AuthMethod:
      Type: Functorial::APIGW::AuthMethod
      Properties:
        HttpMethod:
          Source: amethod_verb
        Auth:
          Source: amethod_auth
        Route:
          Source: amethod_route
        Authorizer:
          Source: amethod_authorizer
        IntegrationType:
          Source: amethod_inttype
        IntegrationUri:
          Source: amethod_inturi

    Authorizer:
      Type: Functorial::APIGW::Authorizer
      Properties:
        Name:
          Source: authorizer_name
        Type:
          Source: authorizer_type
        Uri:
          Source: authorizer_uri
        Api:
          Source: authorizer_api

    Stage:
      Type: Functorial::APIGW::Stage
      Properties:
        StageName:
          Source: stage_name
        Api:
          Source: stage_api

    # Value objects
    ApiName:
      ValueType: String
    ApiDescription:
      ValueType: String
    PathPart:
      ValueType: String
    NestedPathPart:
      ValueType: String
    HttpVerb:
      ValueType: String
    AuthHttpVerb:
      ValueType: String
    AuthType:
      ValueType: String
    AuthAuthType:
      ValueType: String
    IntegrationType:
      ValueType: String
    IntegrationUri:
      ValueType: String
    AuthIntegrationType:
      ValueType: String
    AuthIntegrationUri:
      ValueType: String
    AuthorizerName:
      ValueType: String
    AuthorizerType:
      ValueType: String
    AuthorizerUri:
      ValueType: String
    StageName:
      ValueType: String
    DeployToggle:
      Toggle: true

  Morphisms:
    api_name: Api -> ApiName
    api_description: Api -> ApiDescription
    route_path: Route -> PathPart
    route_api: Route -> Api
    subroute_path: SubRoute -> NestedPathPart
    subroute_parent: SubRoute -> Route
    # Public method
    method_verb: Method -> HttpVerb
    method_auth: Method -> AuthType
    method_route: Method -> Route
    method_inttype: Method -> IntegrationType
    method_inturi: Method -> IntegrationUri
    # Authorized method
    amethod_verb: AuthMethod -> AuthHttpVerb
    amethod_auth: AuthMethod -> AuthAuthType
    amethod_route: AuthMethod -> Route
    amethod_authorizer: AuthMethod -> Authorizer
    amethod_inttype: AuthMethod -> AuthIntegrationType
    amethod_inturi: AuthMethod -> AuthIntegrationUri
    # Authorizer
    authorizer_name: Authorizer -> AuthorizerName
    authorizer_type: Authorizer -> AuthorizerType
    authorizer_uri: Authorizer -> AuthorizerUri
    authorizer_api: Authorizer -> Api
    # Stage
    stage_name: Stage -> StageName
    stage_api: Stage -> Api

  Functor:
    Objects:
      Api: RestApi
      Route: RootResource
      SubRoute: NestedResource
      Method: PublicMethod
      AuthMethod: AuthorizedMethod
      Authorizer: Authorizer
      Stage: Stage
      ApiName: ApiName
      ApiDescription: ApiDescription
      PathPart: PathPart
      NestedPathPart: NestedPathPart
      HttpVerb: HttpVerb
      AuthHttpVerb: AuthHttpVerb
      AuthType: AuthType
      AuthAuthType: AuthAuthType
      IntegrationType: IntegrationType
      IntegrationUri: IntegrationUri
      AuthIntegrationType: AuthIntegrationType
      AuthIntegrationUri: AuthIntegrationUri
      AuthorizerName: AuthorizerName
      AuthorizerType: AuthorizerType
      AuthorizerUri: AuthorizerUri
      StageName: StageName
      DeployToggle: DeployToggle

    Morphisms:
      api_name: api_name
      api_description: api_description
      route_path: root_resource_path
      route_api: root_resource_api
      subroute_path: nested_resource_path
      subroute_parent: nested_parent
      method_verb: pub_method_verb
      method_auth: pub_method_auth
      method_route: pub_method_resource
      method_inttype: pub_method_integration . integration_type
      method_inturi: pub_method_integration . integration_uri
      amethod_verb: auth_method_verb
      amethod_auth: auth_method_auth
      amethod_route: auth_method_resource
      amethod_authorizer: auth_method_authorizer
      amethod_inttype: auth_method_integration . auth_integration_type
      amethod_inturi: auth_method_integration . auth_integration_uri
      authorizer_name: authorizer_name
      authorizer_type: authorizer_type
      authorizer_uri: authorizer_uri
      authorizer_api: authorizer_api
      stage_name: stage_name
      stage_api: stage_api

  # Macros: syntactic sugar that expands before the Kan extension runs.
  Macros:
    # Users can write Methods inline on a Route
    Functorial::APIGW::Route.Methods:
      ExpandsTo: Functorial::APIGW::Method
      ElementProperty: HttpMethod
      BackRef: Route
      Forward: [IntegrationUri]