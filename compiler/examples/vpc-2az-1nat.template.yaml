# 2-AZ VPC with public and private subnets, single NAT gateway.
# Cost-optimized: cross-AZ traffic instead of per-AZ NAT.
#
# Compare to CDK:
#   new ec2.Vpc(this, 'VPC', {
#     cidr: '10.0.0.0/16',
#     maxAzs: 2,
#     natGateways: 1,
#   })
#
# Produces 17 resources:
#   VPC(1) + PublicSubnet(2) + PrivateSubnet(2) +
#   PublicRT(2) + PrivateRT(2) + PublicRTAssoc(2) + PrivateRTAssoc(2) +
#   IGW(1) + IGWAttach(1) + PublicRoute(2) +
#   EIP(1) + NatGateway(1) + PrivateRoute(2)
#   = 21... wait, let me recount without isolated:
#   1 + 2 + 2 + 2 + 2 + 2 + 2 + 1 + 1 + 2 + 1 + 1 + 2 = 21

Schema: ./vpc.schema.yaml

Toggles:
  IgwToggle: true
  VpnToggle: false

Resources:
  MyVpc:
    Type: Functorial::VPC::Network
    Properties:
      CidrBlock: "10.0.0.0/16"
      DnsHostnames: true
      DnsSupport: true
      Tenancy: "default"

  PublicA:
    Type: Functorial::VPC::PublicTier
    Properties:
      CidrBlock: "10.0.0.0/24"
      AvailabilityZone: "us-east-1a"

  PublicB:
    Type: Functorial::VPC::PublicTier
    Properties:
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: "us-east-1b"

  PrivateA:
    Type: Functorial::VPC::PrivateTier
    Properties:
      CidrBlock: "10.0.10.0/24"
      AvailabilityZone: "us-east-1a"

  PrivateB:
    Type: Functorial::VPC::PrivateTier
    Properties:
      CidrBlock: "10.0.11.0/24"
      AvailabilityZone: "us-east-1b"

  NatA:
    Type: Functorial::VPC::NatGateway
    Properties:
      Subnet: PublicA