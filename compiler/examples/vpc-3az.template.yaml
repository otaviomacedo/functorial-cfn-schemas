# A 3-AZ VPC with public, private, and isolated tiers,
# 3 NAT gateways, internet gateway, VPN gateway, and S3/DynamoDB endpoints.
#
# Compare to CDK:
#   new ec2.Vpc(this, 'VPC', {
#     cidr: '10.0.0.0/16',
#     maxAzs: 3,
#     natGateways: 3,
#     vpnGateway: true,
#     subnetConfiguration: [
#       { name: 'Public', subnetType: SubnetType.PUBLIC, cidrMask: 24 },
#       { name: 'Private', subnetType: SubnetType.PRIVATE_WITH_EGRESS, cidrMask: 24 },
#       { name: 'Isolated', subnetType: SubnetType.PRIVATE_ISOLATED, cidrMask: 28 },
#     ],
#     gatewayEndpoints: {
#       S3: { service: GatewayVpcEndpointAwsService.S3 },
#       DynamoDB: { service: GatewayVpcEndpointAwsService.DYNAMODB },
#     },
#   })

Schema: ./vpc.schema.yaml

Toggles:
  IgwToggle: true
  VpnToggle: true

Resources:
  MyVpc:
    Type: Functorial::VPC::Network
    Properties:
      CidrBlock: "10.0.0.0/16"
      DnsHostnames: true
      DnsSupport: true
      Tenancy: "default"

  PublicA:
    Type: Functorial::VPC::PublicTier
    Properties:
      CidrBlock: "10.0.0.0/24"
      AvailabilityZone: "us-east-1a"
      Network: MyVpc

  PublicB:
    Type: Functorial::VPC::PublicTier
    Properties:
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: "us-east-1b"
      Network: MyVpc

  PublicC:
    Type: Functorial::VPC::PublicTier
    Properties:
      CidrBlock: "10.0.2.0/24"
      AvailabilityZone: "us-east-1c"
      Network: MyVpc

  PrivateA:
    Type: Functorial::VPC::PrivateTier
    Properties:
      CidrBlock: "10.0.10.0/24"
      AvailabilityZone: "us-east-1a"
      Network: MyVpc

  PrivateB:
    Type: Functorial::VPC::PrivateTier
    Properties:
      CidrBlock: "10.0.11.0/24"
      AvailabilityZone: "us-east-1b"
      Network: MyVpc

  PrivateC:
    Type: Functorial::VPC::PrivateTier
    Properties:
      CidrBlock: "10.0.12.0/24"
      AvailabilityZone: "us-east-1c"
      Network: MyVpc

  IsolatedA:
    Type: Functorial::VPC::IsolatedTier
    Properties:
      CidrBlock: "10.0.20.0/28"
      AvailabilityZone: "us-east-1a"
      Network: MyVpc

  IsolatedB:
    Type: Functorial::VPC::IsolatedTier
    Properties:
      CidrBlock: "10.0.20.16/28"
      AvailabilityZone: "us-east-1b"
      Network: MyVpc

  IsolatedC:
    Type: Functorial::VPC::IsolatedTier
    Properties:
      CidrBlock: "10.0.20.32/28"
      AvailabilityZone: "us-east-1c"
      Network: MyVpc

  NatA:
    Type: Functorial::VPC::NatGateway
    Properties:
      Subnet: PublicA

  NatB:
    Type: Functorial::VPC::NatGateway
    Properties:
      Subnet: PublicB

  NatC:
    Type: Functorial::VPC::NatGateway
    Properties:
      Subnet: PublicC

  S3Endpoint:
    Type: Functorial::VPC::GatewayEndpoint
    Properties:
      ServiceName: "com.amazonaws.us-east-1.s3"
      Network: MyVpc

  DynamoEndpoint:
    Type: Functorial::VPC::GatewayEndpoint
    Properties:
      ServiceName: "com.amazonaws.us-east-1.dynamodb"
      Network: MyVpc