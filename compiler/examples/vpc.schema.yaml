# Schema: VPC
#
# Morphisms are declared inline as properties:
#   `Source: X` — a morphism to object X (structural reference)
#   `Value: T` — a terminal value of type T (rendered as property value)
#   `Default: x` — a literal constant (rendered as-is in CFN)
#   `Via: GetAtt.Attr` — rendering annotation (Ref vs GetAtt)

# ============================================================================
# C: The CloudFormation-level category
# ============================================================================

OriginalSchema:
  Objects:
    # --- Core VPC ---
    VPC:
      CfnType: AWS::EC2::VPC
      Properties:
        CidrBlock:
          Value: String
        EnableDnsHostnames:
          Value: Boolean
        EnableDnsSupport:
          Value: Boolean
        InstanceTenancy:
          Value: String

    # --- Subnets ---
    PublicSubnet:
      CfnType: AWS::EC2::Subnet
      Properties:
        VpcId:
          Source: VPC
        CidrBlock:
          Value: String
        AvailabilityZone:
          Value: String
        MapPublicIpOnLaunch:
          Default: "true"

    PrivateSubnet:
      CfnType: AWS::EC2::Subnet
      Properties:
        VpcId:
          Source: VPC
        CidrBlock:
          Value: String
        AvailabilityZone:
          Value: String

    IsolatedSubnet:
      CfnType: AWS::EC2::Subnet
      Properties:
        VpcId:
          Source: VPC
        CidrBlock:
          Value: String
        AvailabilityZone:
          Value: String

    # --- Route Tables ---
    PublicRT:
      CfnType: AWS::EC2::RouteTable
      Properties:
        VpcId:
          Source: VPC
      Structure:
        # Not a CFN property — structural-only morphism for path equations
        Subnet:
          Source: PublicSubnet

    PrivateRT:
      CfnType: AWS::EC2::RouteTable
      Properties:
        VpcId:
          Source: VPC
      Structure:
        Subnet:
          Source: PrivateSubnet

    IsolatedRT:
      CfnType: AWS::EC2::RouteTable
      Properties:
        VpcId:
          Source: VPC
      Structure:
        Subnet:
          Source: IsolatedSubnet

    # --- Route Table Associations ---
    PublicRTAssoc:
      CfnType: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId:
          Source: PublicSubnet
        RouteTableId:
          Source: PublicRT

    PrivateRTAssoc:
      CfnType: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId:
          Source: PrivateSubnet
        RouteTableId:
          Source: PrivateRT

    IsolatedRTAssoc:
      CfnType: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId:
          Source: IsolatedSubnet
        RouteTableId:
          Source: IsolatedRT

    # --- Internet Gateway ---
    IGW:
      CfnType: AWS::EC2::InternetGateway
      Structure:
        Toggle:
          Source: IgwToggle

    IGWAttach:
      CfnType: AWS::EC2::VPCGatewayAttachment
      Properties:
        VpcId:
          Source: VPC
        InternetGatewayId:
          Source: IGW

    # --- Public Routes ---
    PublicRoute:
      CfnType: AWS::EC2::Route
      Properties:
        RouteTableId:
          Source: PublicRT
        GatewayId:
          Source: IGW
        DestinationCidrBlock:
          Default: "0.0.0.0/0"

    # --- NAT Gateways ---
    EIP:
      CfnType: AWS::EC2::EIP
      Properties:
        Domain:
          Default: "vpc"

    NatGateway:
      CfnType: AWS::EC2::NatGateway
      Properties:
        SubnetId:
          Source: PublicSubnet
        AllocationId:
          Source: EIP

    # --- Private Routes ---
    PrivateRoute:
      CfnType: AWS::EC2::Route
      Properties:
        RouteTableId:
          Source: PrivateRT
        NatGatewayId:
          Source: NatGateway
        DestinationCidrBlock:
          Default: "0.0.0.0/0"

    # --- VPN Gateway ---
    VPNGateway:
      CfnType: AWS::EC2::VPNGateway
      Properties:
        Type:
          Default: "ipsec.1"
        AmazonSideAsn:
          Value: Number
      Structure:
        Toggle:
          Source: VpnToggle

    VPNGWAttach:
      CfnType: AWS::EC2::VPCGatewayAttachment
      Properties:
        VpcId:
          Source: VPC
        VpnGatewayId:
          Source: VPNGateway

    VPNRouteProp:
      CfnType: AWS::EC2::VPNGatewayRoutePropagation
      Properties:
        VpnGatewayId:
          Source: VPNGateway

    # --- Gateway Endpoints ---
    GatewayEndpoint:
      CfnType: AWS::EC2::VPCEndpoint
      Properties:
        VpcId:
          Source: VPC
        ServiceName:
          Value: String
        VpcEndpointType:
          Default: "Gateway"

    # --- Toggle objects (cardinality 0 or 1) ---
    IgwToggle:
      Toggle: true

    VpnToggle:
      Toggle: true

  Equations:
    # The RT association pairs the RT with the subnet it structurally belongs to.
    # "Going through the RT to its subnet" = "going directly to the subnet"
    - PublicRTAssoc.RouteTableId . PublicRT.Subnet = PublicRTAssoc.SubnetId
    - PrivateRTAssoc.RouteTableId . PrivateRT.Subnet = PrivateRTAssoc.SubnetId
    - IsolatedRTAssoc.RouteTableId . IsolatedRT.Subnet = IsolatedRTAssoc.SubnetId


# ============================================================================
# D: The user-facing category
# ============================================================================

SimplifiedSchema:
  Objects:
    Network:
      Type: Functorial::VPC::Network
      Properties:
        CidrBlock:
          Value: String
        DnsHostnames:
          Value: Boolean
        DnsSupport:
          Value: Boolean
        Tenancy:
          Value: String

    PublicTier:
      Type: Functorial::VPC::PublicTier
      Properties:
        CidrBlock:
          Value: String
        AvailabilityZone:
          Value: String
        Network:
          Source: Network

    PrivateTier:
      Type: Functorial::VPC::PrivateTier
      Properties:
        CidrBlock:
          Value: String
        AvailabilityZone:
          Value: String
        Network:
          Source: Network

    IsolatedTier:
      Type: Functorial::VPC::IsolatedTier
      Properties:
        CidrBlock:
          Value: String
        AvailabilityZone:
          Value: String
        Network:
          Source: Network

    NatSlot:
      Type: Functorial::VPC::NatGateway
      Properties:
        Subnet:
          Source: PublicTier

    Endpoint:
      Type: Functorial::VPC::GatewayEndpoint
      Properties:
        ServiceName:
          Value: String
        Network:
          Source: Network

    IgwToggle:
      Toggle: true

    VpnToggle:
      Toggle: true

  Functor:
    Objects:
      Network: VPC
      PublicTier: PublicSubnet
      PrivateTier: PrivateSubnet
      IsolatedTier: IsolatedSubnet
      NatSlot: NatGateway
      Endpoint: GatewayEndpoint
      IgwToggle: IgwToggle
      VpnToggle: VpnToggle

    Morphisms:
      # Only needed when mapping is non-obvious.
      # Format: D_Object.Property: path in C
      #
      # The compiler can auto-infer these when there's exactly one
      # morphism from G(Source) to G(Target) in C. Listed here for
      # explicitness.

      PublicTier.Network: PublicSubnet.VpcId
      PrivateTier.Network: PrivateSubnet.VpcId
      IsolatedTier.Network: IsolatedSubnet.VpcId
      NatSlot.Subnet: NatGateway.SubnetId
      Endpoint.Network: GatewayEndpoint.VpcId

      # Value morphisms — paths through C
      # PublicTier.CidrBlock maps to PublicSubnet.CidrBlock (same name, auto-inferred)
      # PublicTier.AvailabilityZone maps to PublicSubnet.AvailabilityZone (auto-inferred)
      # Network.CidrBlock maps to VPC.CidrBlock (auto-inferred)

      # Composite paths (D morphism maps to a path of length > 1 in C):
      # None in this schema — all D-morphisms map to single C-morphisms.

